<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920,height=1080">

<style>
html, body{
    width:1920px;
    height:1080px;
    margin:0;
    overflow:hidden;
    background:transparent;
    font-family:Arial, Helvetica, sans-serif;
}

#weather{
    position:absolute;
    top:20px;
    left:20px;
    background:transparent;
    color:#ffeb3b;
    text-shadow:
        2px 2px 4px rgba(0,0,0,0.8),
        0 0 8px rgba(0,0,0,0.6);
    padding:20px 35px;
    font-size:40px;
    font-weight:bold;

    display:grid;
    grid-template-columns:auto auto;
    grid-template-rows:auto auto;
    gap:12px 40px;
}

.item{
    white-space:nowrap;
}
</style>
</head>

<body>

<div id="weather">
    <div class="item">🌡 <span id="temp">--</span>°C</div>
    <div class="item"><span id="windIcon">🍃</span> <span id="wind">--</span> km/h</div>

    <div class="item">💧 <span id="hum">--</span>%</div>
    <div class="item"><span id="cloudIcon">☁️</span> <span id="clouds">--</span>%</div>
</div>

<script>
const API_KEY = "b8148ca3c38f6ec423def5ba2bc0820c";

const LAT = 49.0901;
const LON = 8.3989;

function getWindIcon(speed){
    if(speed < 10) return "🍃";
    if(speed < 20) return "💨";
    if(speed < 35) return "🌀";
    return "🌪️";
}

function getCloudIcon(clouds){
    if(clouds <= 10) return "☀️";
    if(clouds <= 30) return "🌤️";
    if(clouds <= 60) return "⛅";
    if(clouds <= 90) return "☁️";
    return "☁️☁️";
}

async function loadWeather(){
    try{
        const response = await fetch(
            `https://api.openweathermap.org/data/2.5/weather?lat=${LAT}&lon=${LON}&units=metric&lang=de&appid=${API_KEY}`
        );

        const data = await response.json();

        if(!response.ok){
            document.getElementById("temp").innerText = "ERR";
            return;
        }

        const windKmh = Math.round(data.wind.speed * 3.6);

        document.getElementById("temp").innerText =
            Math.round(data.main.temp);

        document.getElementById("wind").innerText =
            windKmh;

        document.getElementById("windIcon").innerText =
            getWindIcon(windKmh);

        document.getElementById("hum").innerText =
            data.main.humidity;

        document.getElementById("clouds").innerText =
            data.clouds.all;

        document.getElementById("cloudIcon").innerText =
            getCloudIcon(data.clouds.all);

    } catch(error){
        document.getElementById("temp").innerText = "ERR";
    }
}

loadWeather();
setInterval(loadWeather, 600000);
</script>

</body>
</html>
