<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920,height=1080">

<style>
html, body{
    width:1920px;
    height:1080px;
    margin:0;
    overflow:hidden;
    background:transparent;
    font-family:Arial, Helvetica, sans-serif;
}

#weather{
    position:absolute;
    top:20px;
    left:20px;
    background:transparent;
    color:#ffeb3b;
    text-shadow:
        2px 2px 4px rgba(0,0,0,0.8),
        0 0 8px rgba(0,0,0,0.6);
    padding:20px 35px;
    font-size:40px;
    font-weight:bold;

    display:grid;
    grid-template-columns:auto auto;
    grid-template-rows:auto auto;
    gap:12px 40px;
}

.item{
    white-space:nowrap;
}
</style>
</head>

<body>

<div id="weather">
    <div class="item">🌡 <span id="temp">--</span>°C</div>
    <div class="item"><span id="windIcon">🍃</span> <span id="wind">--</span> km/h</div>

    <div class="item">💧 <span id="hum">--</span>%</div>
    <div class="item"><span id="weatherIcon">☀️</span> <span id="clouds">--</span>%</div>
</div>

<script>
const LAT = 49.0901;
const LON = 8.3989;

function getWindIcon(speed){
    if(speed < 10) return "🍃";
    if(speed < 20) return "💨";
    if(speed < 35) return "🌀";
    return "🌪️";
}

function getWeatherIcon(code){
    if(code === 0) return "☀️";
    if(code === 1) return "🌤️";
    if(code === 2) return "⛅";
    if(code === 3) return "☁️";

    if(code >= 45 && code <= 48) return "🌫️";

    if(code >= 51 && code <= 57) return "🌦️";
    if(code >= 61 && code <= 67) return "🌧️";
    if(code >= 80 && code <= 82) return "🌧️";

    if(code >= 71 && code <= 77) return "❄️";
    if(code >= 85 && code <= 86) return "❄️";

    if(code >= 95 && code <= 99) return "⛈️";

    return "❓";
}

async function loadWeather(){
    try{
        const response = await fetch(
            `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&current=temperature_2m,relative_humidity_2m,cloud_cover,wind_speed_10m,weather_code&timezone=Europe%2FBerlin`
        );

        const data = await response.json();

        if(!response.ok || !data.current){
            document.getElementById("temp").innerText = "ERR";
            return;
        }

        const temp = Math.round(data.current.temperature_2m);
        const hum = data.current.relative_humidity_2m;
        const clouds = data.current.cloud_cover;
        const wind = Math.round(data.current.wind_speed_10m);
        const code = data.current.weather_code;

        document.getElementById("temp").innerText = temp;
        document.getElementById("wind").innerText = wind;
        document.getElementById("windIcon").innerText = getWindIcon(wind);
        document.getElementById("hum").innerText = hum;
        document.getElementById("clouds").innerText = clouds;
        document.getElementById("weatherIcon").innerText = getWeatherIcon(code);

    } catch(error){
        document.getElementById("temp").innerText = "ERR";
    }
}

loadWeather();
setInterval(loadWeather, 5 * 60 * 1000);
</script>

</body>
</html>
