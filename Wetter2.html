<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920,height=1080">

<style>
html, body{
    width:1920px;
    height:1080px;
    margin:0;
    overflow:hidden;
    background:transparent;
    font-family:Arial, Helvetica, sans-serif;
}

#weather{
    position:absolute;
    top:20px;
    left:20px;

    background:rgba(30,30,30,0.8);
    color:#fff;

    padding:20px 35px;
    border-radius:15px;

    font-size:32px;
    font-weight:bold;

    display:flex;
    gap:30px;
    align-items:center;
}

.item{
    white-space:nowrap;
}
</style>

</head>
<body>

<div id="weather">
    <div class="item">🌡 <span id="temp">--</span>°C</div>
    <div class="item">💨 <span id="wind">--</span> km/h</div>
    <div class="item">🧭 <span id="dir">--</span></div>
    <div class="item">💧 <span id="hum">--</span>%</div>
</div>

<script>
const API_KEY = "b8148ca3c38f6ec423def5ba2bc0820c";

const LAT = 49.0901;
const LON = 8.3989;

function getDirection(deg){
    const dirs = [
        "N","NO","O","SO",
        "S","SW","W","NW"
    ];

    return dirs[Math.round(deg / 45) % 8];
}

async function loadWeather(){
    try{
        const response = await fetch(
            `https://api.openweathermap.org/data/2.5/weather?lat=${LAT}&lon=${LON}&units=metric&lang=de&appid=${API_KEY}`
        );

        const data = await response.json();

        if(!response.ok){
            document.getElementById("temp").innerText = "ERR";
            console.log(data);
            return;
        }

        document.getElementById("temp").innerText =
            Math.round(data.main.temp);

        document.getElementById("wind").innerText =
            Math.round(data.wind.speed * 3.6);

        document.getElementById("dir").innerText =
            getDirection(data.wind.deg);

        document.getElementById("hum").innerText =
            data.main.humidity;

    } catch(error){
        console.log(error);
    }
}

loadWeather();
setInterval(loadWeather, 600000);
</script>

</body>
</html>
